version: "3.8"

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - var:/var/www/html/var
    environment:
      APP_ENV: dev
      DATABASE_URL: "postgresql://app:app@database:5432/app?serverVersion=16&charset=utf8"
    depends_on:
      - database

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    volumes:
      - .:/var/www/html:ro
      - vendor:/var/www/html/vendor:ro
      - var:/var/www/html/var
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "app", "-U", "app"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - database_data:/var/lib/postgresql/data:rw

  adminer:
    image: adminer:4
    ports:
      - "8099:8080"
    depends_on:
      - database

volumes:
  database_data:
  vendor:
  var:
